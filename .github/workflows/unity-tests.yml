name: Unity EditMode Tests

# Executa os testes EditMode (lógica de jogo) via GameCI.
# Requer os secrets de licença do Unity configurados no repositório:
#   UNITY_LICENSE, UNITY_EMAIL, UNITY_PASSWORD
# Sem esses secrets o job é pulado (não falha o PR), pois a licença é pessoal.

on:
  push:
    branches: ["**"]
    paths:
      - "Assets/**"
      - "Packages/**"
      - "ProjectSettings/**"
      - ".github/workflows/unity-tests.yml"
  pull_request:
    paths:
      - "Assets/**"
      - "Packages/**"
      - "ProjectSettings/**"

jobs:
  editmode-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check Unity license secret
        id: gate
        run: |
          if [ -n "${{ secrets.UNITY_LICENSE }}" ]; then
            echo "has_license=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_license=false" >> "$GITHUB_OUTPUT"
            echo "::notice::UNITY_LICENSE não configurado — pulando testes Unity (licença pessoal)."
          fi

      - uses: actions/checkout@v4
        if: steps.gate.outputs.has_license == 'true'
        with:
          lfs: true

      - uses: actions/cache@v4
        if: steps.gate.outputs.has_license == 'true'
        with:
          path: Library
          key: Library-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: Library-

      - name: Run EditMode tests
        if: steps.gate.outputs.has_license == 'true'
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          testMode: editmode
          unityVersion: 6000.0.32f1
